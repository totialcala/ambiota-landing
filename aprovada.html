<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaça confirmada — AMBIOTA Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      background-color: #F7F5F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 24px rgba(14,40,0,0.07);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0E2800;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #555550;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .detail {
      margin-top: 28px;
      background: #F0F7EC;
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 13px;
      color: #3a5a2a;
      line-height: 1.6;
    }
    .logo {
      margin-bottom: 32px;
    }
    .logo img {
      height: 32px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="https://www.ambiotaacademy.com/ambiota_logo_Web.png" alt="AMBIOTA">
    </div>
    <div class="icon">✅</div>
    <h1>Plaça confirmada</h1>
    <p>L'email de confirmació s'ha enviat automàticament al professional.</p>
    <p>Rebran les instruccions per confirmar les condicions de la seva plaça becada.</p>
    <div class="detail">
      El contacte ha estat mogut a <strong>Plaça Reservada</strong> al pipeline<br>
      <strong>Academy Beca 2026</strong>.
    </div>
  </div>
</body>
</html>
